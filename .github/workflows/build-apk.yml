name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
      
      - name: Show Gradle info
        run: |
          cd android
          cat gradle/wrapper/gradle-wrapper.properties
          cat build.gradle
          cat app/build.gradle
      
      - name: Build APK with Gradle
        run: |
          cd android
          ./gradlew clean assembleDebug --no-daemon --stacktrace --info 2>&1 | tee /tmp/gradle.log
        continue-on-error: true
      
      - name: Show Gradle output
        if: always()
        run: |
          echo "=== GRADLE BUILD OUTPUT ==="
          cat /tmp/gradle.log || echo "No log file"
          echo "=== END GRADLE OUTPUT ==="
      
      - name: Verify APK
        run: |
          echo "Looking for APK..."
          find android/app/build/outputs/apk/ -name "*.apk" -ls 2>/dev/null || echo "APK not found"
          ls -lh android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug folder not found"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
